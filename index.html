    .aud-angle strong { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #5C4BE8; margin-bottom: 3px; }
    .aud-list-table { width: 100%; border-collapse: collapse; font-size: 13px; border: 1px solid #C0C8E8; border-radius: 12px; overflow: hidden; }
    .aud-list-table th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #4A4A8C; background: #E8EAF6; border-bottom: 1px solid #C0C8E8; }
    .aud-list-table td { padding: 12px 16px; border-bottom: 1px solid #C8CDE8; color: #1a1a2e; vertical-align: top; line-height: 1.5; }
    .aud-list-table tr:last-child td { border-bottom: none; }
    .aud-list-table td:first-child { border-left: 4px solid #5C4BE8; padding-left: 12px; }
    .aud-list-name { font-weight: 600; font-size: 13px; color: #1A1A3E; }
    .aud-list-titles { font-size: 12px; color: #4A4A8C; margin-top: 2px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }
    .info-card { background: #fff; border: 1px solid #C0C8E8; border-radius: 12px; padding: 18px 20px; }
    .info-card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #5C4BE8; margin-bottom: 12px; }
    .info-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; padding: 6px 0; border-bottom: 1px solid #E8EAF6; font-size: 13px; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #4A4A8C; font-weight: 500; flex-shrink: 0; }
    .info-value { color: #1A1A3E; text-align: right; font-size: 12px; }
    .info-value.purple { color: #2D2A8C; font-weight: 600; }
    .stack-table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; border: 1px solid #C0C8E8; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
    .stack-table th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #4A4A8C; background: #E8EAF6; border-bottom: 1px solid #C0C8E8; }
    .stack-table td { padding: 11px 16px; border-bottom: 1px solid #C8CDE8; vertical-align: top; color: #1a1a2e; font-size: 13px; line-height: 1.5; }
    .stack-table tr:last-child td { border-bottom: none; }
    .stack-table td:first-child { font-weight: 600; color: #1A1A3E; white-space: nowrap; }
    .status-pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
    .status-active  { background: #EAE8F5; color: #2D2A8C; }
    .status-planned { background: #FDF3DC; color: #7A5200; }
    .empty-state { text-align: center; padding: 56px 20px; color: #4A4A8C; font-size: 14px; }
    #loading { text-align: center; padding: 60px; color: #5C4BE8; font-size: 14px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1A1A3E; color: #fff; font-size: 13px; padding: 10px 20px; border-radius: 8px; display: none; z-index: 999; white-space: nowrap; }
  </style>
</head>
<body>
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">ReRev Labs <span>/ Comms Review</span></div>
    <div class="gate-subtitle">Communications &amp; marketing tracker — internal only</div>
    <input type="password" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()" />
    <button class="gate-btn" onclick="checkPw()">Enter</button>
    <div class="gate-error" id="gate-error">Incorrect password. Please try again.</div>
  </div>
</div>
<div id="app">
  <div class="site-header">
    <div class="site-logo">ReRev Labs <span>/ Comms &amp; Marketing</span></div>
    <div class="header-meta" id="last-updated">Loading...</div>
  </div>
  <div class="tabs-bar">
    <div class="tab active" onclick="switchTab('campaigns',this)">Campaigns <span class="tab-badge badge-pending" id="count-pending">—</span></div>
    <div class="tab" onclick="switchTab('initiatives',this)">Initiatives <span class="tab-badge badge-initiative" id="count-initiatives">—</span></div>
    <div class="tab" onclick="switchTab('reports',this)">Weekly Reports <span class="tab-badge badge-reports" id="count-reports">—</span></div>
    <div class="tab" onclick="switchTab('audiences',this)">Audiences <span class="tab-badge badge-audience" id="count-audiences">—</span></div>
    <div class="tab" onclick="switchTab('sysinfo',this)">System Info <span class="tab-badge badge-info">&#9432;</span></div>
  </div>
  <div class="main">
    <div id="loading">Loading...</div>
    <div id="campaigns"   class="tab-content" style="display:none;"></div>
    <div id="initiatives" class="tab-content" style="display:none;"></div>
    <div id="reports"     class="tab-content" style="display:none;"></div>
    <div id="audiences"   class="tab-content" style="display:none;"></div>
    <div id="sysinfo"     class="tab-content" style="display:none;"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  const SITE_PASSWORD = 'rerev2026';
  const REPO_RAW   = 'https://raw.githubusercontent.com/keyona-rerev/rerev-comms-review/main';
  const PAGES_BASE = 'https://keyona-rerev.github.io/rerev-comms-review';

  let audView = 'card';
  let campFilter = 'all';
  let campView = 'cards';
  let iniView = 'cards';
  let allCampaigns = [];
  let allRejections = [];
  let allInitiatives = [];
  let allFormats = [];
  let reportWeeks = [];
  let reportsCache = {};
  let currentReportWeek = null;
  let statusOverrides = {};

  function showToast(msg, ms) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, ms || 2500);
  }

  function checkPw() {
    if (document.getElementById('pw-input').value === SITE_PASSWORD) {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      try { const s = localStorage.getItem('rerev_status'); if (s) statusOverrides = JSON.parse(s); } catch(e) {}
      loadData();
    } else {
      document.getElementById('gate-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  function moveStatus(campId, newStatus) {
    if (!newStatus) return;
    statusOverrides[campId] = newStatus;
    try { localStorage.setItem('rerev_status', JSON.stringify(statusOverrides)); } catch(e) {}
    showToast('Status updated to: ' + newStatus);
    renderCampView();
  }

  function getEffectiveStatus(camp) {
    return statusOverrides[camp.id] || camp.outreachStatus;
  }

  async function loadData() {
    try {
      const ts = '?t=' + Date.now();
      const [campRes, rejRes, audRes, fmtRes, iniRes] = await Promise.all([
        fetch(REPO_RAW + '/campaigns.json' + ts),
        fetch(REPO_RAW + '/rejections.json' + ts),
        fetch(REPO_RAW + '/audiences.json' + ts),
        fetch(REPO_RAW + '/content_formats.json' + ts),
        fetch(REPO_RAW + '/initiatives.json' + ts)
      ]);
      const campData = await campRes.json();
      const rejData  = await rejRes.json();
      const audData  = await audRes.json();
      const fmtData  = await fmtRes.json();
      const iniData  = await iniRes.json();
      allCampaigns   = campData.campaigns  || [];
      allRejections  = rejData.rejections  || [];
      allInitiatives = iniData.initiatives || [];
      allFormats     = fmtData.formats     || [];
      window._allInitiatives = allInitiatives;
      window._allFormats     = allFormats;
      reportWeeks = await discoverReportWeeks();
      render(allCampaigns, allRejections, audData.audiences || [], allFormats, allInitiatives);
    } catch(e) {
      document.getElementById('loading').textContent = 'Failed to load. Please refresh. (' + e.message + ')';
    }
  }

  async function discoverReportWeeks() {
    const found = [];
    for (let n = 1; n <= 52; n++) {
      try {
        const res = await fetch(REPO_RAW + '/reports/week-' + n + '.json?t=' + Date.now());
        if (!res.ok) break;
        const data = await res.json();
        reportsCache[n] = data;
        found.push(n);
      } catch(e) { break; }
    }
    return found;
  }

  function render(campaigns, rejections, audiences, formats, initiatives) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('count-pending').textContent     = campaigns.length || '0';
    document.getElementById('count-initiatives').textContent = initiatives.length || '0';
    document.getElementById('count-audiences').textContent   = audiences.length;
    document.getElementById('count-reports').textContent     = reportWeeks.length > 0 ? reportWeeks.length + ' wk' : '0';
    const now = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    document.getElementById('last-updated').textContent = 'keyona@rerev.io · ' + now;
    renderCampaignsTab(campaigns, rejections);
    renderInitiativesTab(initiatives, campaigns, formats);
    renderReportsTab();
    renderAudiencesTab(audiences, campaigns);
    renderSysInfo(campaigns);
    document.getElementById('campaigns').classList.add('active');
    document.getElementById('campaigns').style.display = 'block';
  }

  function switchTab(id, el) {
    document.querySelectorAll('.tab-content').forEach(t => { t.style.display = 'none'; t.classList.remove('active'); });
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
  }

  /* ---- CAMPAIGNS ---- */
  function renderCampaignsTab(campaigns, rejections) {
    const el = document.getElementById('campaigns');
    const rejMap = {};
    rejections.forEach(r => { rejMap[r.id] = r.reason; });
    campaigns.forEach(c => { if (c.status === 'rejected' && rejMap[c.id]) c._rejectionReason = rejMap[c.id]; });
    el.innerHTML = `
      <div class="camp-toolbar">
        <div class="camp-toolbar-left">
          <select class="seq-filter" id="camp-filter-select" onchange="campFilter=this.value;renderCampView()">
            <option value="all">All campaigns</option>
            <option value="pending">Awaiting Review</option>
            <option value="approved">Approved</option>
            <option value="rejected">Flagged</option>
            <option value="waiting">Waiting on Them</option>
            <option value="blocked">Legitimate Blocker</option>
            <option value="move">Time to Move</option>
          </select>
          <div class="seq-count-note" id="camp-count-note"></div>
        </div>
        <div class="view-toggle">
          <button class="view-btn active" id="btn-cards" onclick="setCampView('cards')">&#9632; Cards</button>
          <button class="view-btn" id="btn-board" onclick="setCampView('board')">&#9638; Board</button>
          <button class="view-btn" id="btn-list" onclick="setCampView('list')">&#9776; List</button>
        </div>
      </div>
      <div id="camp-view-area"></div>
    `;
    window._allCamps = campaigns;
    renderCampView();
  }

  function setCampView(v) {
    campView = v;
    document.getElementById('btn-cards').classList.toggle('active', v === 'cards');
    document.getElementById('btn-board').classList.toggle('active', v === 'board');
    document.getElementById('btn-list').classList.toggle('active', v === 'list');
    renderCampView();
  }

  function getFilteredCamps() {
    const camps = window._allCamps || [];
    if (campFilter === 'all')      return camps;
    if (campFilter === 'pending')  return camps.filter(c => c.status === 'pending');
    if (campFilter === 'approved') return camps.filter(c => c.status === 'approved');
    if (campFilter === 'rejected') return camps.filter(c => c.status === 'rejected');
    if (campFilter === 'waiting')  return camps.filter(c => getEffectiveStatus(c) === 'waiting');
    if (campFilter === 'blocked')  return camps.filter(c => getEffectiveStatus(c) === 'blocked');
    if (campFilter === 'move')     return camps.filter(c => { const s = getEffectiveStatus(c); return s === 'needs_send' || !s; });
    return camps;
  }

  function renderCampView() {
    const filtered = getFilteredCamps();
    const note = document.getElementById('camp-count-note');
    if (note) note.textContent = filtered.length + ' campaign' + (filtered.length !== 1 ? 's' : '');
    const area = document.getElementById('camp-view-area');
    if (!area) return;
    if (!filtered.length) {
      area.innerHTML = '<div class="empty-state"><strong>No campaigns yet.</strong><p style="margin-top:8px;font-size:13px;color:#5C4BE8;">Push your first campaign to get started.</p></div>';
      return;
    }
    if (campView === 'list') {
      renderCampListView(filtered, area);
    } else if (campView === 'board') {
      const waiting = filtered.filter(c => getEffectiveStatus(c) === 'waiting');
      const blocked = filtered.filter(c => getEffectiveStatus(c) === 'blocked');
      const move    = filtered.filter(c => { const s = getEffectiveStatus(c); return s === 'needs_send' || !s; });
      function boardCol(label, sub, cls, dotCls, items, detailKey, detailLabel) {
        const cards = items.length ? items.map(c => {
          const det = c[detailKey] ? '<div class="status-card-detail"><strong>' + detailLabel + '</strong>' + escHtml(c[detailKey]) + '</div>' : '';
          const mv = '<select class="move-select" style="margin-top:8px;" onchange="moveStatus(\'' + c.id + '\',this.value);this.blur()">'
            + '<option value="">Move to...</option>'
            + '<option value="waiting">Waiting on Them</option>'
            + '<option value="blocked">Legitimate Blocker</option>'
            + '<option value="needs_send">Time to Move</option>'
            + '</select>';
          return '<div class="status-card"><div class="status-card-title">' + escHtml(c.name || c.title || c.id) + '</div><div class="status-card-org">' + escHtml(c.contactOrg || c.targetAudience || '') + (c.from ? ' &middot; ' + escHtml(c.from) : '') + '</div>' + det + mv + '</div>';
        }).join('') : '<div class="status-empty">None right now.</div>';
        return '<div class="status-col ' + cls + '"><div class="status-col-header"><span class="status-dot ' + dotCls + '"></span>' + label + ' <span class="status-col-count">' + items.length + '</span></div><div class="status-col-sub">' + sub + '</div>' + cards + '</div>';
      }
      area.innerHTML = '<div class="status-columns">'
        + boardCol('Waiting on Them', 'You sent something. Ball is in their court.', 'status-col-waiting', 'dot-waiting', waiting, 'waitingOn', 'Waiting on')
        + boardCol('Legitimate Blocker', 'Something real is in the way.', 'status-col-blocked', 'dot-blocked', blocked, 'blocker', 'Blocker')
        + boardCol('Time to Move', 'Outreach not sent yet. Your attention goes here.', 'status-col-move', 'dot-move', move, 'angle', 'Angle')
        + '</div>';
    } else {
      const sorted = [
        ...filtered.filter(c => c.status === 'pending'),
        ...filtered.filter(c => c.status === 'approved'),
        ...filtered.filter(c => c.status === 'rejected'),
        ...filtered.filter(c => c.status === 'drafting')
      ];
      area.innerHTML = sorted.map(c => renderCampCard(c)).join('');
    }
  }

  function renderCampListView(filtered, area) {
    const rows = filtered.map(c => {
      const eff = getEffectiveStatus(c);
      const emailRaw = c.contactEmail || '';
      const emailCell = emailRaw ? '<span class="list-email">' + escHtml(emailRaw) + '</span>' : '<span style="font-size:11px;color:#ccc;">—</span>';
      const sourceCell = c.sc_initiative_id ? '<span style="font-size:11px;color:#2D2A8C;">' + escHtml(c.sc_initiative_id) + '</span>' : '<span style="font-size:11px;color:#ccc;">—</span>';
      const reviewPill = (c.status === 'approved') ? '<span class="status-pill-seq pill-approved">Approved</span>'
        : (c.status === 'rejected') ? '<span class="status-pill-seq pill-rejected">Flagged</span>'
        : (c.status === 'drafting') ? '<span class="status-pill-seq" style="background:#E8EAF6;color:#4A4A8C;">In Progress</span>'
        : '<span class="status-pill-seq pill-pending">Pending</span>';
      const statusSelect = '<select class="list-status-select" onchange="moveStatus(\'' + c.id + '\',this.value)">'
        + '<option value="waiting"' + (eff === 'waiting' ? ' selected' : '') + '>Waiting on Them</option>'
        + '<option value="blocked"' + (eff === 'blocked' ? ' selected' : '') + '>Blocker</option>'
        + '<option value="needs_send"' + ((eff === 'needs_send' || !eff) ? ' selected' : '') + '>Time to Move</option>'
        + '</select>';
      const contactCount = (c.contacts && c.contacts.length) ? '<div style="font-size:11px;color:#5C4BE8;margin-top:2px;">' + c.contacts.length + ' contacts</div>' : '';
      return '<tr>'
        + '<td><div class="list-title-cell">' + escHtml(c.name || c.title || c.id) + '</div><div class="list-org">' + escHtml(c.contactOrg || (c.audience_id ? c.audience_id.replace(/-/g,' ') : '') || '') + '</div><div class="list-person">' + escHtml(c.send_from || c.contactPerson || '') + '</div>' + contactCount + '</td>'
        + '<td>' + emailCell + '</td>'
        + '<td>' + statusSelect + '</td>'
        + '<td>' + reviewPill + '</td>'
        + '<td>' + sourceCell + '</td>'
        + '</tr>';
    }).join('');
    area.innerHTML = '<table class="list-table"><thead><tr><th>Campaign / Contact</th><th>Email</th><th>Outreach status</th><th>Review</th><th>Initiative</th></tr></thead><tbody>' + rows + '</tbody></table>';
  }

  const TYPE_BADGE_MAP = { email:'badge-email', linkedin:'badge-linkedin', content:'badge-content', event:'badge-event', pr:'badge-pr' };
  const TYPE_LABEL_MAP = { email:'Email', linkedin:'LinkedIn', content:'Content', event:'Event', pr:'PR / Press' };

  function outreachPillHtml(camp) {
    const s = getEffectiveStatus(camp);
    if (s === 'waiting') return '<span class="outreach-pill outreach-waiting">Waiting on Them</span>';
    if (s === 'blocked') return '<span class="outreach-pill outreach-blocked">Blocker</span>';
    return '<span class="outreach-pill outreach-move">Time to Move</span>';
  }

  function renderCampCard(camp) {
    const ini = (window._allInitiatives || []).find(i => i.id === camp.sc_initiative_id);
    const iniStrip = ini ? '<div class="ini-context-strip"><strong>Initiative</strong>' + escHtml(ini.name) + ' — ' + escHtml(ini.goal) + '</div>' : '';
    const intelStrip = camp.contactIntel ? '<div class="contact-intel-strip"><strong>Contact Intel</strong>' + escHtml(camp.contactIntel) + '</div>' : '';
    const status = camp.status || 'pending';
    const pillClass = status === 'approved' ? 'pill-approved' : status === 'rejected' ? 'pill-rejected' : 'pill-pending';
    const pillLabel = status === 'approved' ? 'Approved' : status === 'rejected' ? 'Flagged' : status === 'drafting' ? 'In Progress' : 'Awaiting Review';
    const typeKey = (camp.type || 'email').toLowerCase();
    const typeBadge = '<span class="type-badge ' + (TYPE_BADGE_MAP[typeKey] || 'badge-email') + '">' + (TYPE_LABEL_MAP[typeKey] || camp.type || 'Email') + '</span>';
    const fromTag = camp.send_from ? ' &middot; From: ' + escHtml(camp.send_from) : (camp.from ? ' &middot; From: ' + escHtml(camp.from) : '');
    const cadence = camp.cadence ? ' &middot; ' + camp.cadence : '';
    const dateTag = camp.created ? escHtml(camp.created) : escHtml(camp.pushedDate || '');
    const viewBtn = camp.campaignFile ? '<a class="btn btn-view" href="' + PAGES_BASE + '/' + camp.campaignFile + '" target="_blank">View campaign</a>' : '';
    const feedbackBtn = status === 'pending' ? '<a class="btn btn-feedback" href="https://github.com/keyona-rerev/rerev-comms-review/issues/new?title=Feedback%3A+' + encodeURIComponent(camp.name || camp.title || camp.id) + '&body=**Campaign+ID:**+' + camp.id + '%0A%0A**Feedback:**%0A" target="_blank">Leave feedback</a>' : '';
    const moveSelectHtml = '<select class="move-select" onchange="moveStatus(\'' + camp.id + '\',this.value)">'
      + '<option value="">Move status...</option>'
      + '<option value="waiting">Waiting on Them</option>'
      + '<option value="blocked">Legitimate Blocker</option>'
      + '<option value="needs_send">Time to Move</option>'
      + '</select>';
    const approvedNote = status === 'approved' && camp.approvalNote ? '<div class="approved-note"><strong>Why it worked</strong>' + escHtml(camp.approvalNote) + '</div>' : '';
    const rejectedNote = status === 'rejected' && (camp.rejectionReason || camp._rejectionReason) ? '<div class="rejection-note"><strong>Feedback</strong>' + escHtml(camp.rejectionReason || camp._rejectionReason) + '</div>' : '';
    const usageNote = camp.usageNote ? '<div class="usage-note">' + escHtml(camp.usageNote) + '</div>' : '';
    const ctaNote = camp.cta_model ? '<div class="angle-note"><strong>CTA Model</strong>' + escHtml(camp.cta_model) + '</div>' : (camp.angle ? '<div class="angle-note"><strong>Angle</strong>' + escHtml(camp.angle) + '</div>' : '');
    const blockerNote = getEffectiveStatus(camp) === 'blocked' && camp.blocker ? '<div class="rejection-note"><strong>Blocker</strong>' + escHtml(camp.blocker) + '</div>' : '';
    const draftId = 'draft-' + camp.id;
    const draftHtml = camp.emailDraft ? '<span class="draft-toggle" onclick="toggleDraft(\'' + draftId + '\', this)">&#9660; View email draft</span><div class="draft-block" id="' + draftId + '">' + escHtml(camp.emailDraft) + '</div>' : '';
    const contactsHtml = (camp.contacts && camp.contacts.length) ? renderCampContacts(camp) : '';
    const displayTitle = camp.name || camp.title || camp.id;
    const displayAudience = camp.audience_id ? camp.audience_id.replace(/-/g,' ') : (camp.targetAudience || '');
    return '<div class="card"><div class="card-top"><div><div class="card-title">' + escHtml(displayTitle) + '</div>'
      + (displayAudience ? '<div class="card-audience">' + escHtml(displayAudience) + '</div>' : '')
      + '<div class="card-meta">' + dateTag + cadence + fromTag + ' ' + typeBadge + outreachPillHtml(camp) + '</div></div>'
      + '<span class="status-pill-seq ' + pillClass + '">' + pillLabel + '</span></div>'
      + iniStrip + intelStrip + usageNote + ctaNote + blockerNote + approvedNote + rejectedNote + draftHtml + contactsHtml
      + '<div class="card-actions">' + viewBtn + feedbackBtn + moveSelectHtml + '</div></div>';
  }

  function renderCampContacts(camp) {
    const count = camp.contacts.length;
    const panelId = 'contacts-panel-' + camp.id;
    const iconId  = 'contacts-icon-' + camp.id;
    const rows = camp.contacts.map((ct, i) => {
      const rowId = 'email-' + camp.id + '-' + i;
      const statusPill = ct.status === 'sent'
        ? '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:#EAE8F5;color:#2D2A8C;">Sent</span>'
        : ct.status === 'replied'
        ? '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:#FDF3DC;color:#7A5200;">Replied</span>'
        : '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:#F0EEE8;color:#5A5850;">Drafted</span>';
      const emailBody = ct.body ? '<div class="draft-block" id="' + rowId + '" style="display:none;margin-top:8px;">' + escHtml(ct.body) + '</div>' : '';
      const toggleBtn = ct.body ? '<span class="draft-toggle" style="margin-top:6px;display:inline-block;" onclick="toggleDraft(\'' + rowId + '\',this)">&#9660; View email</span>' : '';
      return '<div style="background:#F7F8FC;border:1px solid #C8CDE8;border-radius:8px;padding:10px 14px;margin-bottom:8px;">'
        + '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">'
        + '<div><div style="font-size:13px;font-weight:600;color:#1A1A3E;">' + escHtml(ct.name) + '</div>'
        + '<div style="font-size:11px;color:#4A4A8C;">' + escHtml(ct.org || '') + (ct.email ? ' &middot; ' + escHtml(ct.email) : '') + '</div>'
        + (ct.subject ? '<div style="font-size:11px;color:#555;margin-top:2px;font-style:italic;">' + escHtml(ct.subject) + '</div>' : '')
        + '</div>' + statusPill + '</div>'
        + toggleBtn + emailBody
        + '</div>';
    }).join('');
    return '<div style="margin-bottom:12px;">'
      + '<div class="fmt-toggle-bar" onclick="toggleContactsPanel(\'' + panelId + '\',\'' + iconId + '\')">'
      + '<span class="fmt-toggle-label">&#9993; Contacts &amp; Emails (' + count + ')</span>'
      + '<span class="fmt-toggle-icon" id="' + iconId + '">&#9660;</span>'
      + '</div>'
      + '<div id="' + panelId + '" style="display:none;margin-top:10px;">' + rows + '</div>'
      + '</div>';
  }

  function toggleContactsPanel(panelId, iconId) {
    const panel = document.getElementById(panelId);
    const icon  = document.getElementById(iconId);
    if (!panel) return;
    const open = panel.style.display === 'block';
    panel.style.display = open ? 'none' : 'block';
    if (icon) icon.classList.toggle('open', !open);
  }

  function toggleDraft(id, btn) {
    const el = document.getElementById(id);
    if (!el) return;
    const open = el.style.display === 'block';
    el.style.display = open ? 'none' : 'block';
    btn.textContent = open ? '\u25bc View email' : '\u25b2 Hide email';
  }

  /* ---- INITIATIVES ---- */
  function setIniView(v) {
    iniView = v;
    document.getElementById('ini-btn-cards').classList.toggle('active', v === 'cards');
    document.getElementById('ini-btn-list').classList.toggle('active', v === 'list');
    renderIniView();
  }

  function renderInitiativesTab(initiatives, campaigns, formats) {
    const el = document.getElementById('initiatives');
    if (!initiatives.length) { el.innerHTML = '<div class="empty-state"><strong>No initiatives yet.</strong></div>'; return; }
    window._iniCampaigns = campaigns;
    window._iniFmtMap = {};
    formats.forEach(f => { window._iniFmtMap[f.id] = f; });
    const ORDER = { Critical: 0, High: 1, Medium: 2, Low: 3 };
    window._iniSorted = [...initiatives].sort((a, b) => (ORDER[a.priority] ?? 9) - (ORDER[b.priority] ?? 9));
    el.innerHTML = `
      <div class="camp-toolbar">
        <div class="camp-toolbar-left">
          <div class="section-label" style="margin:0;">${initiatives.length} initiative${initiatives.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="view-toggle">
          <button class="view-btn active" id="ini-btn-cards" onclick="setIniView('cards')">&#9632; Cards</button>
          <button class="view-btn" id="ini-btn-list" onclick="setIniView('list')">&#9776; List</button>
        </div>
      </div>
      <div id="ini-view-area"></div>
    `;
    renderIniView();
  }

  function renderIniView() {
    const area = document.getElementById('ini-view-area');
    if (!area) return;
    const sorted = window._iniSorted || [];
    const campaigns = window._iniCampaigns || [];
    const fmtMap = window._iniFmtMap || {};
    if (iniView === 'list') {
      const rows = sorted.map(ini => {
        const statusKey = (ini.status || '').toLowerCase().replace(/\s/g, '');
        const statusCls = statusKey === 'active' ? 'ini-status-active' : statusKey === 'planning' ? 'ini-status-planning' : 'ini-status-braindump';
        const priCls = ini.priority === 'Critical' ? 'ini-priority-critical' : ini.priority === 'High' ? 'ini-priority-high' : 'ini-priority-medium';
        const linked = campaigns.filter(c => c.sc_initiative_id === ini.id || (ini.linked_campaigns || []).includes(c.id));
        const campCount = linked.length ? '<span style="font-size:11px;color:#4A4A8C;">' + linked.length + ' campaign' + (linked.length !== 1 ? 's' : '') + '</span>' : '<span style="font-size:11px;color:#ccc;">—</span>';
        const question = ini.core_question ? '<div class="ini-list-question">' + escHtml(ini.core_question) + '</div>' : '';
        return '<tr>'
          + '<td><div class="ini-list-name">' + escHtml(ini.name) + '</div><div class="ini-list-venture">' + escHtml(ini.venture || '') + '</div>' + question + '</td>'
          + '<td><span class="ini-status-pill ' + statusCls + '">' + escHtml(ini.status) + '</span></td>'
          + '<td><span class="' + priCls + '">' + escHtml(ini.priority) + '</span></td>'
          + '<td style="font-size:12px;color:#555;">' + escHtml(ini.timeline || '—') + '</td>'
          + '<td>' + campCount + '</td>'
          + '<td style="font-size:11px;color:#8B84D8;font-family:monospace;">' + escHtml(ini.id) + '</td>'
          + '</tr>';
      }).join('');
      area.innerHTML = '<table class="ini-list-table"><thead><tr><th>Initiative</th><th>Status</th><th>Priority</th><th>Timeline</th><th>Campaigns</th><th>ID</th></tr></thead><tbody>' + rows + '</tbody></table>';
    } else {
      area.innerHTML = sorted.map(ini => renderIniCard(ini, campaigns, fmtMap)).join('');
    }
  }

  function renderIniCard(ini, campaigns, fmtMap) {
    const statusKey = (ini.status || '').toLowerCase().replace(/\s/g, '');
    const statusCls = statusKey === 'active' ? 'ini-status-active' : statusKey === 'planning' ? 'ini-status-planning' : 'ini-status-braindump';
    const priCls = ini.priority === 'Critical' ? 'ini-priority-critical' : ini.priority === 'High' ? 'ini-priority-high' : 'ini-priority-medium';
    const question = ini.core_question ? '<div class="ini-question"><strong>Core question</strong>' + escHtml(ini.core_question) + '</div>' : '';
    const notes = ini.notes ? '<div class="ini-notes"><strong>Notes</strong>' + escHtml(ini.notes) + '</div>' : '';
    const allLinked = campaigns.filter(c => c.sc_initiative_id === ini.id || (ini.linked_campaigns || []).includes(c.id));
    const uniqueLinked = [...new Map(allLinked.map(c => [c.id, c])).values()];
    const contactSection = uniqueLinked.length
      ? '<hr class="ini-section-divider"><span class="ini-section-label">Campaigns &amp; Contacts (' + uniqueLinked.length + ')</span>'
        + uniqueLinked.map(c => {
          const personLine = c.contactPerson ? escHtml(c.contactPerson) + (c.contactTitle ? ', ' + escHtml(c.contactTitle) : '') : '';
          const intel = c.contactIntel ? '<div class="ini-contact-intel">' + escHtml(c.contactIntel) + '</div>' : '';
          const eff = getEffectiveStatus(c);
          const outreach = eff === 'waiting' ? '<span style="font-size:10px;color:#2D2A8C;font-weight:600;">Waiting on them</span>'
            : eff === 'blocked' ? '<span style="font-size:10px;color:#8B3A1A;font-weight:600;">Blocker</span>'
            : '<span style="font-size:10px;color:#7A5200;font-weight:600;">Time to move</span>';
          return '<div class="ini-contact-card"><div class="ini-contact-name">' + escHtml(c.contactOrg || c.name || c.title) + ' ' + outreach + '</div>' + (personLine ? '<div class="ini-contact-title">' + personLine + '</div>' : '') + intel + '</div>';
        }).join('')
      : '';
    const linkedFmts = (ini.contentFormats || []).map(fid => fmtMap[fid]).filter(Boolean);
    const fmtSection = linkedFmts.length
      ? '<hr class="ini-section-divider"><div class="fmt-toggle-bar" onclick="toggleFmt(\'' + ini.id + '\')"><span class="fmt-toggle-label">Content Formats (' + linkedFmts.length + ')</span><span class="fmt-toggle-icon" id="fmticon-' + ini.id + '">&#9660;</span></div><div class="fmt-panel" id="fmtpanel-' + ini.id + '">'
        + linkedFmts.map(f => {
          const sc = f.status === 'In Development' ? 'fmt-status-dev' : 'fmt-status-concept';
          const ol = (f.contentOutline || []).map(i => '<li>' + escHtml(i) + '</li>').join('');
          return '<div class="fmt-card"><div class="fmt-header"><div><div class="fmt-name">' + escHtml(f.name) + '</div><div class="fmt-meta">' + escHtml(f.duration || '') + '</div></div><span class="fmt-status ' + sc + '">' + escHtml(f.status) + '</span></div><div class="fmt-value-prop">' + escHtml(f.valueProp || '') + '</div><div class="fmt-section">Content outline</div><ul class="fmt-outline">' + ol + '</ul><div class="fmt-section">Co-host angle</div><div class="fmt-cohost">' + escHtml(f.coHostAngle || '') + '</div></div>';
        }).join('') + '</div>'
      : '';
    return '<div class="ini-card"><div class="ini-card-top"><div><div class="ini-name">' + escHtml(ini.name) + '</div><div class="ini-timeline">' + escHtml(ini.timeline || '') + '</div></div><div class="ini-pills"><span class="ini-status-pill ' + statusCls + '">' + escHtml(ini.status) + '</span><span class="' + priCls + '">' + escHtml(ini.priority) + '</span></div></div><div class="ini-goal">' + escHtml(ini.goal) + '</div>' + question + notes + contactSection + fmtSection + '<div class="ini-id">' + escHtml(ini.id) + '</div></div>';
  }

  function toggleFmt(iniId) {
    const panel = document.getElementById('fmtpanel-' + iniId);
    const icon  = document.getElementById('fmticon-' + iniId);
    if (!panel) return;
    const open = panel.style.display === 'block';
    panel.style.display = open ? 'none' : 'block';
    if (icon) icon.classList.toggle('open', !open);
  }

  /* ---- REPORTS ---- */
  function renderReportsTab() {
    const el = document.getElementById('reports');
    if (!reportWeeks.length) { el.innerHTML = '<div class="reports-no-data"><strong>No reports yet.</strong><p>Add reports/week-1.json to populate.</p></div>'; return; }
    currentReportWeek = reportWeeks[reportWeeks.length - 1];
    const opts = reportWeeks.slice().reverse().map(n => '<option value="' + n + '"' + (n === currentReportWeek ? ' selected' : '') + '>Week ' + n + '</option>').join('');
    el.innerHTML = '<div class="reports-toolbar"><select class="reports-week-select" onchange="selectReportWeek(parseInt(this.value))">' + opts + '</select><div class="seq-count-note">' + reportWeeks.length + ' week(s)</div></div><div id="report-body"></div>';
    renderReportBody(currentReportWeek);
  }

  function selectReportWeek(n) { currentReportWeek = n; renderReportBody(n); }

  function renderReportBody(n) {
    const body = document.getElementById('report-body');
    if (!body) return;
    const data = reportsCache[n];
    if (!data) { body.innerHTML = '<div class="reports-no-data"><strong>No data for Week ' + n + '.</strong></div>'; return; }
    let html = '<div class="report-week-label">Week ' + n + (data.date_range ? ' · ' + escHtml(data.date_range) : '') + '</div>';
    if (data.highlights && data.highlights.length) html += '<div class="report-block"><div class="report-block-title">Highlights</div><ul style="padding-left:18px;font-size:13px;line-height:1.7;">' + data.highlights.map(h => '<li style="margin-bottom:6px;">' + escHtml(h) + '</li>').join('') + '</ul></div>';
    if (data.next_steps && data.next_steps.length) html += '<div class="report-block"><div class="report-block-title">Next steps</div><ul style="padding-left:18px;font-size:13px;line-height:1.7;">' + data.next_steps.map(h => '<li style="margin-bottom:6px;">' + escHtml(h) + '</li>').join('') + '</ul></div>';
    if (data.notes) html += '<div class="report-block"><div class="report-block-title">Notes</div><div class="report-note">' + escHtml(data.notes) + '</div></div>';
    body.innerHTML = html;
  }

  /* ---- AUDIENCES ---- */
  function renderAudiencesTab(audiences, campaigns) {
    const el = document.getElementById('audiences');
    el.innerHTML = '<div class="aud-toolbar"><div class="section-label" style="margin:0;">' + audiences.length + ' audience profile(s)</div><div class="view-toggle"><button class="view-btn active" id="aud-card-btn" onclick="setAudView(\'card\')">Cards</button><button class="view-btn" id="aud-list-btn" onclick="setAudView(\'list\')">List</button></div></div><div id="aud-card-view" class="aud-grid">' + audiences.map(a => renderAudCard(a, campaigns)).join('') + '</div><div id="aud-list-view" style="display:none;">' + renderAudList(audiences, campaigns) + '</div>';
  }

  function setAudView(v) {
    audView = v;
    document.getElementById('aud-card-view').style.display = v === 'card' ? 'grid' : 'none';
    document.getElementById('aud-list-view').style.display = v === 'list' ? 'block' : 'none';
    document.getElementById('aud-card-btn').classList.toggle('active', v === 'card');
    document.getElementById('aud-list-btn').classList.toggle('active', v === 'list');
  }

  function renderAudCard(a, campaigns) {
    const linked = campaigns.filter(c => c.audience_id === a.id || (a.campaigns || []).includes(c.id));
    const seqLink = linked.length ? '<div style="margin-top:8px;font-size:11px;color:#5C4BE8;">' + linked.length + ' campaign(s) linked</div>' : '';
    const lpLink = a.landingPage ? '<div style="margin-top:6px;"><a href="' + escHtml(a.landingPage) + '" target="_blank" style="font-size:11px;color:#5C4BE8;">' + escHtml(a.landingPage) + '</a></div>' : '';
    return '<div class="aud-card"><div class="aud-segment">' + escHtml(a.segment || '') + '</div><div class="aud-name">' + escHtml(a.name) + '</div><div class="aud-titles">' + escHtml((a.targetTitles || []).join(', ')) + '</div><div class="aud-tags">' + (a.sector ? '<span class="aud-tag aud-tag-sector">' + escHtml(a.sector) + '</span>' : '') + (a.geo ? '<span class="aud-tag aud-tag-geo">' + escHtml(a.geo) + '</span>' : '') + '</div><div class="aud-angle"><strong>Angle</strong>' + escHtml(a.angle || a.whyTheyMatter || '') + '</div>' + lpLink + seqLink + '</div>';
  }

  function renderAudList(audiences, campaigns) {
    if (!audiences.length) return '<div class="empty-state"><strong>No audience profiles yet.</strong></div>';
    return '<table class="aud-list-table"><thead><tr><th>Audience</th><th>Titles</th><th>Sector / Geo</th></tr></thead><tbody>' + audiences.map(a => '<tr><td><div class="aud-list-name">' + escHtml(a.name) + '</div><div class="aud-list-titles">' + escHtml(a.segment || '') + '</div></td><td>' + escHtml((a.targetTitles || []).join(', ')) + '</td><td>' + escHtml(a.sector || '') + (a.geo ? ' / ' + escHtml(a.geo) : '') + '</td></tr>').join('') + '</tbody></table>';
  }

  /* ---- SYS INFO ---- */
  function renderSysInfo(campaigns) {
    const el = document.getElementById('sysinfo');
    const pending  = campaigns.filter(c => c.status === 'pending').length;
    const approved = campaigns.filter(c => c.status === 'approved').length;
    const rejected = campaigns.filter(c => c.status === 'rejected').length;
    const drafting = campaigns.filter(c => c.status === 'drafting').length;
    el.innerHTML = '<div class="info-grid"><div class="info-card"><div class="info-card-title">Campaign summary</div><div class="info-row"><span class="info-label">Total</span><span class="info-value">' + campaigns.length + '</span></div><div class="info-row"><span class="info-label">In progress</span><span class="info-value">' + drafting + '</span></div><div class="info-row"><span class="info-label">Awaiting review</span><span class="info-value">' + pending + '</span></div><div class="info-row"><span class="info-label">Approved</span><span class="info-value purple">' + approved + '</span></div><div class="info-row"><span class="info-label">Flagged</span><span class="info-value">' + rejected + '</span></div></div><div class="info-card"><div class="info-card-title">Portal info</div><div class="info-row"><span class="info-label">Venture</span><span class="info-value">ReRev Labs</span></div><div class="info-row"><span class="info-label">Reviewer</span><span class="info-value">Keyona Meeks</span></div><div class="info-row"><span class="info-label">Repo</span><span class="info-value"><a href="https://github.com/keyona-rerev/rerev-comms-review" target="_blank" style="color:#5C4BE8;">rerev-comms-review</a></span></div><div class="info-row"><span class="info-label">Campaigns file</span><span class="info-value">campaigns.json</span></div></div></div><table class="stack-table"><thead><tr><th>File</th><th>Purpose</th><th>Status</th></tr></thead><tbody><tr><td>campaigns.json</td><td>All campaign records with contacts and email bodies</td><td><span class="status-pill status-active">Active</span></td></tr><tr><td>audiences.json</td><td>ICP audience profiles with landing pages</td><td><span class="status-pill status-active">Active</span></td></tr><tr><td>initiatives.json</td><td>Active ReRev initiatives</td><td><span class="status-pill status-active">Active</span></td></tr><tr><td>content_formats.json</td><td>Workshop and keynote formats</td><td><span class="status-pill status-active">Active</span></td></tr><tr><td>reports/week-N.json</td><td>Weekly progress reports</td><td><span class="status-pill status-planned">Add as needed</span></td></tr></tbody></table>';
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
